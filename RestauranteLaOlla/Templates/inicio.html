{% extends 'index.html' %} 
{% block content %} 
{% load static %}

<style>
  .chart-container {
    position: relative;
    margin-top: 5vh;
    padding: 20px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Sombra suave como tu diseño */
  }
  
  canvas {
    max-height: 60vh;
    width: 100% !important;
  }

  #modal-overlay-ini {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 110vh;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 900;
    display: none;
    transform: translateY(-10vh);
  }
</style>

<div class="container-fluid">
  <div class="row">
    <div class="col-sm-8">
      <div class="chart-container">
        <h5 class="text-muted">Ventas de la semana (7d)</h5>
        <canvas id="myChart"></canvas>
      </div>
    </div>
    
    <div class="col-sm-4">
      <div class="chart-container">
        <h5 class="text-muted">Métodos de Pago (30d)</h5>
        <canvas id="pieChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/inicio.js' %}"></script>
{% endblock %}
