{% load static %}

{% for Tipo in Tipos %}

    <span class="tipoNombre" title="Tipo de consumible">
        <div class="tipoNombreHead"></div>
        {{Tipo.Nombre}}
        <div class="tipoNombreFoot"></div>
    </span>

    <div class="PlatillosVenta">
        {% for platillo in Tipo.PlatillosFiltrados %}
        
        <!-- Se muestra un platillo -->
        <div class="vplatillo" id="platillo{{platillo.Id}}" title="Consumible">
            <div class="datoPlatillo">
                <button data-toggle="modal" data-target="#MostrarDetalleConsumible" class="btnDetalleConsumible" onclick="PonerInfoConsumible('{{platillo.ImagenUrl}}', '{{platillo.Nombre}}', '{{platillo.IdTipoPlatillo.Nombre}}', '{{platillo.Descripcion}}', '{{platillo.Precio}}')" title="Muestra un modal con información adicional del consumible">

                    <svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 15H11V9H9V15ZM10.7125 6.7125C10.9042 6.52083 11 6.28333 11 6C11 5.71667 10.9042 5.47917 10.7125 5.2875C10.5208 5.09583 10.2833 5 10 5C9.71667 5 9.47917 5.09583 9.2875 5.2875C9.09583 5.47917 9 5.71667 9 6C9 6.28333 9.09583 6.52083 9.2875 6.7125C9.47917 6.90417 9.71667 7 10 7C10.2833 7 10.5208 6.90417 10.7125 6.7125ZM10 20C8.61667 20 7.31667 19.7375 6.1 19.2125C4.88333 18.6875 3.825 17.975 2.925 17.075C2.025 16.175 1.3125 15.1167 0.7875 13.9C0.2625 12.6833 0 11.3833 0 10C0 8.61667 0.2625 7.31667 0.7875 6.1C1.3125 4.88333 2.025 3.825 2.925 2.925C3.825 2.025 4.88333 1.3125 6.1 0.7875C7.31667 0.2625 8.61667 0 10 0C11.3833 0 12.6833 0.2625 13.9 0.7875C15.1167 1.3125 16.175 2.025 17.075 2.925C17.975 3.825 18.6875 4.88333 19.2125 6.1C19.7375 7.31667 20 8.61667 20 10C20 11.3833 19.7375 12.6833 19.2125 13.9C18.6875 15.1167 17.975 16.175 17.075 17.075C16.175 17.975 15.1167 18.6875 13.9 19.2125C12.6833 19.7375 11.3833 20 10 20ZM10 18C12.2333 18 14.125 17.225 15.675 15.675C17.225 14.125 18 12.2333 18 10C18 7.76667 17.225 5.875 15.675 4.325C14.125 2.775 12.2333 2 10 2C7.76667 2 5.875 2.775 4.325 4.325C2.775 5.875 2 7.76667 2 10C2 12.2333 2.775 14.125 4.325 15.675C5.875 17.225 7.76667 18 10 18Z" fill="#B44646"/>
                    </svg>

                </button>

                {% if platillo.ImagenUrl %}
                    <img src="{{ platillo.ImagenUrl.url }}" alt="Imagen de {{platillo.Nombre}}" title="Imagen del consumible">
                {% else %}
                    <img src="{% static 'img/ProductoSinFoto.png' %}" alt="Consumible sin foto" title="Consumible sin foto">
                {% endif %}
            </div>

            <div class="infoGenPlatillo">
                <span class="nombrePlatillo" title="{{ platillo.Nombre }}">{{ platillo.Nombre }}</span>
                <span class="precioPlatillo" title="Precio del consumible">C${{ platillo.Precio }}</span>
            </div>

            <div class="accionesPlatillo">
                
                <div class="cantidad">
            
                    <!-- Botones input para cantidad -->
                    <button id="less" style="border-right: solid 1px #B44646;" class="btnLessPlus" onclick="cambio('{{platillo.Id}}', 0)" title="Reduce la cantidad del consumible a agregar al carrito">-</button>
                    <input type="number" class="cantBox" id="{{platillo.Id}}" value="0" disabled title="Cantidad de consumibles que se agregarán al carrito">
                    <button id="plus" style="border-left: solid 1px #B44646;" class="btnLessPlus" onclick="cambio('{{platillo.Id}}', 1)" title="Aumenta la cantidad del consumible a agregar al carrito">+</button>
            
                </div>
                
                <div class="botonesPlatillo">
                    <button class="btnaddCarrito" id="addcarrito{{platillo.Id}}"
                        onclick='addCarrito("{{platillo.Id}}", "{{platillo.Nombre}}", "{{platillo.Precio}}")' disabled title="Agrega el consumible al carrito">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M11 9V6H8V4H11V1H13V4H16V6H13V9H11ZM5.5875 21.4125C5.19583 21.0208 5 20.55 5 20C5 19.45 5.19583 18.9792 5.5875 18.5875C5.97917 18.1958 6.45 18 7 18C7.55 18 8.02083 18.1958 8.4125 18.5875C8.80417 18.9792 9 19.45 9 20C9 20.55 8.80417 21.0208 8.4125 21.4125C8.02083 21.8042 7.55 22 7 22C6.45 22 5.97917 21.8042 5.5875 21.4125ZM15.5875 21.4125C15.1958 21.0208 15 20.55 15 20C15 19.45 15.1958 18.9792 15.5875 18.5875C15.9792 18.1958 16.45 18 17 18C17.55 18 18.0208 18.1958 18.4125 18.5875C18.8042 18.9792 19 19.45 19 20C19 20.55 18.8042 21.0208 18.4125 21.4125C18.0208 21.8042 17.55 22 17 22C16.45 22 15.9792 21.8042 15.5875 21.4125ZM1 4V2H4.275L8.525 11H15.525L19.425 4H21.7L17.3 11.95C17.1167 12.2833 16.8708 12.5417 16.5625 12.725C16.2542 12.9083 15.9167 13 15.55 13H8.1L7 15H19V17H7C6.25 17 5.67917 16.675 5.2875 16.025C4.89583 15.375 4.88333 14.7167 5.25 14.05L6.6 11.6L3 4H1Z" fill="white"/>
                        </svg>
                            
                        <span style="transform: translateY(-5px);">Agregar</span>
                    </button>
                </div>
            </div>
        </div> <!-- Cierre vplatillo -->
        
        {% endfor %}

    </div>

{% endfor %}

<div id="emptyStatePlatillos">
    <img src="{% static 'img/NuevoLogoLaOlla3.png' %}" alt="" id="logodecoESOrdenes" />

    <svg viewBox="0 0 200 60" width="260" height="80" id="svgCurvoOrdenes">
        <path id="pathCurva" d="M 10,20 Q 100,70 190,20" fill="transparent" />
        
        <text style="transform: translateY(-15px);">
            <textPath href="#pathCurva" startOffset="50%" text-anchor="middle" id="textoEmptyStateOrdenes">
                Sin resultados
        </text>
    </svg>
</div>
