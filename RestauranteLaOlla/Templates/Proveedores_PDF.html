
<head><meta charset="UTF-8">
    <style>
      body {
        background-image: url('{% static 'img/Logo la olla 2.png' %}');
        background-size: cover;
        background-opacity: 0.7;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
    h1{
      text-align: center;
        color: black;
        margin-bottom: 10px;
    }
      
      p {
        text-align: center;
        color: black;
        font-size: 24px;
        margin-bottom: 10px;
      }
      
      table {
        border-collapse: collapse;
        width: 100%;
      }
      
      th, td {
        padding: 10px;
        text-align: center;
        border: 1px solid #ccc;
        color: #333;
        text-transform: uppercase;
      }
      
      th {
        background-color: #f2f2f2;
        font-weight: bold;
      }
      
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <h1><strong>Proveedores</strong></h1>
    <hr/>
    <p>Listado de Proveedores para el restaurante "La Olla"</p>
    <Br>
    <table>
      <tbody>
        <tr>
          <th>Nombre de Proveedor</th>
          <th>Direccion</th>
          <th>Telefono</th>
          <th>Correo</th>
          <th>Estado</th>
        </tr>
        {% for p in Proveedores %}
        <tr>
          <td>{{p.nombreprov}}</td>
            <td>{{p.direccionprov}}</td>
          <td>C${{p.telefonoprov}}</td>
          <td>{{p.correoprov}}</td>
          <td>{{p.activo}}</td>
        </tr>
        {%endfor%}
      </tbody>
    </table>
  
   
  </body>
  </html>
